# ============================================================
# HawksTrade Configuration
# ============================================================
# Edit this file to control all bot behaviour.
# Mode switch: "paper" or "live"
# ============================================================

# --- TRADING MODE ---
mode: paper          # "paper" = simulation | "live" = real money

# --- SECRETS SOURCE ---
# "local" = load from config/.env or .env (for local dev)
# "shm"   = load from /dev/shm/.hawkstrade.env (for EC2; populated at boot by scripts/fetch_secrets.sh)
# Set HAWKSTRADE_REQUIRE_SHM=1 in production cron/systemd to fail closed if the shm file is unavailable.
secrets_source: shm

# --- ALPACA ENDPOINTS ---
alpaca:
  paper_base_url: "https://paper-api.alpaca.markets"
  live_base_url:  "https://api.alpaca.markets"
  data_base_url:  "https://data.alpaca.markets"
  crypto_data_url: "https://data.alpaca.markets"

# --- INTRADAY TRADING ---
intraday:
  enabled: false           # DISABLED by default. Set true to allow same-day entries & exits.
  # When false, the bot will only enter positions that it intends to hold
  # for at least 1 trading day (swing trades).

# --- GENERAL TRADING PARAMETERS ---
trading:
  max_positions: 10              # Maximum number of open positions at any time (global cap)
  max_crypto_positions: 3        # Max open crypto positions. Set to 0 to disable crypto entries entirely.
  min_crypto_positions: 0        # Reserved slots for crypto — stocks cannot fill these slots.
                                 # Crypto is NOT required to use them; reservation only blocks stocks
                                 # from saturating the portfolio. Set both max and min to 0 to disable crypto.
                                 # Invariant: min_crypto_positions <= max_crypto_positions <= max_positions
  max_position_pct: 0.08         # Max % of portfolio per position (8%)
  stop_loss_pct: 0.035           # Stop-loss at 3.5% below entry
  take_profit_pct: 0.12          # Take-profit at 12% above entry
  daily_loss_limit_pct: 0.05     # Hard stop from first observed account value for the NY trading date
  min_trade_value_usd: 100       # Minimum $ value per trade
  order_type: "limit"            # "market" or "limit"
  limit_slippage_pct: 0.001      # Limit price set 0.1% from current for fast fills

# --- STOCK UNIVERSE ---
stocks:
  scan_universe:                 # Stocks screened for opportunities each cycle
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
    - META
    - TSLA
    - AMD
    - NFLX
    - JPM
    - BAC
    - GS
    - XOM
    - CVX
    - SPY
    - QQQ
    - ARKK
    - SOFI
    - PLTR
    - COIN
    - ORCL
    - CRM
    - SOUN
    - AI
    - IONQ
    - SMCI
    - ARM
    - AVGO
    - INTC
    - TSM
    - IBM

# --- DYNAMIC UNIVERSE SCREENER ---
screener:
  enabled: true                   # Set true to enable dynamic screening (increases API usage vs static list)
  min_adv_shares: 1000000          # Min avg daily volume (shares, 20-day)
  min_adv_dollars: 50000000        # Min avg daily dollar volume ($50M/day)
  min_price: 10.0                  # Min share price (filter penny stocks and low-quality churn)
  max_price: 2000.0                # Max share price
  min_atr_pct: 0.012               # Min 14-day ATR as % of price (needs movement)
  max_atr_pct: 0.06                # Max 14-day ATR as % of price (avoid unstable tail risk)
  target_atr_pct: 0.03             # Score candidates closest to moderate volatility
  trend_sma_days: 50               # Prefer symbols above their intermediate trend
  min_trend_sma_ratio: 1.0         # Current close must be at/above SMA trend
  max_trend_sma_ratio: 1.30        # Avoid chasing names stretched >30% above trend
  min_20d_return_pct: -0.05        # Avoid recent breakdowns
  max_20d_return_pct: 0.35         # Avoid blow-off moves
  max_universe: 40                 # Hard cap on dynamic candidates returned
  # The legacy scan_universe (above) is always merged in, so existing symbols
  # are never dropped even if they fail the screener filters.

# --- CRYPTO UNIVERSE ---
crypto:
  scan_universe:
    - BTC/USD
    - SOL/USD
    - LINK/USD
    - DOGE/USD
    - LTC/USD
    - DOT/USD

# --- STRATEGIES ---
# Each strategy can be independently enabled/disabled and weighted.
strategies:

  momentum:
    enabled: true
    asset_class: stocks          # stocks | crypto | both
    description: "Adaptive momentum: top-1 high-conviction ranking with ATR-adjusted stops, 1% risk sizing, sector-neutral ranking, breadth coverage guard, breadth-tiered regime, and volume-spike entry (>1.8x 20d avg volume required)"
    top_n: 1                     # Pick only the strongest stock by momentum
    hold_days: 4                 # Minimum hold before profit-aware exit checks
    exit_policy: "profit_trailing" # fixed_hold | profit_trailing | risk_only_baseline
    profit_floor_pct: 0.0        # After hold_days, exit if P&L is flat/negative
    trail_activation_pct: 0.06   # Enable trailing stop once peak gain reaches 6%
    trailing_stop_pct: 0.04      # Exit if price falls 4% from post-entry peak
    max_hold_days: 20            # Cap stale momentum positions even if still green
    min_momentum_pct: 0.10       # Minimum 10% 5-day gain to qualify
    min_alpha_pct: 0.0           # Optional excess 5-day return over SPY; 0 disables this stricter gate
    weight: 1.0                  # Signal weight (relative to other strategies)
    # Phase 1: Volatility-adjusted risk management
    atr_period: 14               # ATR lookback for dynamic stop computation
    atr_multiplier: 2.0          # Stop = entry - atr_multiplier * ATR(14)
    risk_per_trade_pct: 0.01     # Risk 1% of total equity per trade (position sizing)
    # Phase 2: Sector-neutral ranking
    max_positions_per_sector: 1  # Max concurrent positions in any single GICS sector
    # Phase 3: Market breadth tiered regime guard
    breadth_green_threshold: 0.50  # >= 50% above SMA50 → Green (full top_n deployed)
    breadth_red_threshold: 0.25    # < 25% above SMA50 → Red (no new entries)
    min_breadth_coverage_pct: 0.75 # Require valid SMA50 coverage for at least 75% of the scan universe
    yellow_max_positions: 1        # Max positions in Yellow regime (breadth 25–50%)
    volume_spike_ratio: 1.8        # Entry bar volume must exceed this multiple of the 20-day average

  rsi_reversion:
    enabled: true
    asset_class: stocks
    description: "Conservative RSI mean reversion. Entry: RSI<30, %B<20%, vol≥1.5×, 1-bar recovery, price within 15% below and 15% above SMA200. Stop: 2×ATR(14). Exit: price reaches SMA20 OR RSI>50 OR 10-day cap. Regime: skip on severe crash (SPY >20% below 252d peak) or elevated VIX proxy."
    rsi_period: 14
    oversold_threshold: 30          # Entry: RSI below this level (deeply oversold)
    overbought_threshold: 50        # Exit: RSI above this (momentum neutral = edge evaporated)
    hold_days: 10                   # Hard exit after 10 business days
    bb_period: 20                   # Bollinger Band lookback period
    bb_std: 2.0                     # Bollinger Band standard deviation multiplier
    vix_multiplier: 1.2             # HV20 must be below HV_MA × this to allow entries
    atr_period: 14                  # ATR lookback for volatility-adjusted stop
    atr_multiplier: 2.0             # Stop = entry - atr_multiplier × ATR
    risk_per_trade_pct: 0.01        # Risk 1% of equity per trade for ATR-based sizing
    sma200_lower_buffer_pct: 0.15   # Entry blocked if price < SMA200 × (1 - this); prevents buying broken stocks
    sma200_upper_buffer_pct: 0.15   # Entry blocked if price > SMA200 × (1 + this); prevents buying overextended stocks
    volume_spike_ratio: 1.5         # Entry bar volume must exceed this multiple of the 20-day average
    profit_floor_pct: 0.015         # Exit via SMA target must exceed entry × (1 + this) to cover slippage
    weight: 1.0

  gap_up:
    enabled: true
    asset_class: stocks
    description: "Buy confirmed true-gap stocks gapping up 4-15% with opening-volume pace and trend confirmation"
    min_gap_pct: 0.04            # Minimum gap-up percentage
    max_gap_pct: 0.15            # Avoid buying exhaustion gaps beyond this percentage
    require_true_gap: true       # Today's open must also clear the prior day's high
    volume_multiplier: 1.5       # Opening volume pace must be 1.5x the 20-day average daily pace
    volume_avg_period: 20        # Lookback for average volume confirmation
    trend_sma_period: 200        # Use completed closes only; current bar close is not known at entry
    entry_window_minutes: 45     # Only enter within first 45 min of market open
    intraday_exit: false         # Respect intraday.enabled setting above
    hold_days: 3
    timeframe: "1Day"
    opening_timeframe: "1Min"
    session_minutes: 390
    max_open_extension_pct: 0.03 # Avoid chasing names already >3% above the session open
    max_open_fade_pct: 0.005     # Skip if price has already faded >0.5% below the session open
    max_signals: 1               # Take only the top-ranked opening gap per scan to avoid clustered event risk
    atr_period: 14
    atr_multiplier: 2.0
    risk_per_trade_pct: 0.01
    breakdown_exit_pct: 0.0      # Optional failed-gap exit; disabled because the 3-day hold gate performed better
    trend_exit_enabled: false    # Optional trend-loss exit; disabled because the 3-day hold gate performed better
    weight: 0.8

  ma_crossover:
    enabled: true
    asset_class: crypto
    description: "Enter when 9-EMA crosses above 21-EMA with slope + volatility + RSI filters. Exit on daily close max-loss, bearish cross, RSI target, or 12-day hold cap. Uses 2xATR stop and 1%-risk position sizing."
    fast_ema: 9
    slow_ema: 21
    timeframe: "1Day"            # "1Hour" | "4Hour" | "1Day"
    entry_cross_lookback_days: 2  # Allow entry if bullish cross happened within this many completed daily transitions
    hold_days: 12
    max_loss_exit_pct: 0.01      # Strategy-level exit if latest daily close is at least 1% below entry
    atr_period: 14
    atr_multiplier: 2.0
    risk_per_trade_pct: 0.01     # Risk 1% of equity per trade for ATR-based sizing
    rsi_entry_min: 35            # RSI must be at least this to avoid entering oversold chop
    rsi_entry_max: 70            # RSI must be below this to avoid buying overbought
    rsi_exit_max: 75             # Exit if RSI rises above this (overbought target)
    volume_spike_ratio: 1.2      # Entry bar volume must exceed this multiple of the 20-day average
    volume_avg_period: 20        # Period for volume average
    vol_filter_period: 10        # Period for volatility (range) filter average
    weight: 1.0

  range_breakout:
    enabled: true
    asset_class: crypto
    description: "Enter long on confirmed daily close breakout above the configured Donchian high with volume, trend, volatility, RSI, and extension guards. Exit failed breakouts early before the hold cap."
    breakout_lookback_days: 20   # Close must break above the prior N-day high, excluding the current bar
    breakout_pct: 0.008          # Close must break 0.8% beyond the Donchian high
    max_breakout_extension_pct: 0.08  # Avoid chasing closes >8% beyond the breakout level
    volume_multiplier: 2.0       # Volume must be 2.0x average to confirm breakout
    volume_avg_period: 20        # Lookback for average volume confirmation
    timeframe: "1Day"
    hold_days: 14
    atr_period: 14
    atr_multiplier: 2.0
    risk_per_trade_pct: 0.01
    vol_filter_period: 10
    min_range_ratio: 0.5         # Entry bar range must be at least 50% of recent average range
    trend_ema_period: 50         # Price must close above this EMA
    trend_slope_lookback: 5      # Trend EMA must be non-declining across this many bars
    rsi_period: 14
    rsi_entry_max: 78            # Avoid buying severely overextended breakout closes
    rsi_exit_max: 82             # Profit-taking exhaustion exit after profit floor
    profit_floor_pct: 0.03       # RSI exhaustion exit only after at least 3% open profit
    breakdown_exit_pct: 0.02     # Exit failed breakout when close falls 2% below entry
    trend_exit_enabled: true     # Exit when completed close falls below trend EMA
    weight: 0.9

# --- VALIDATION GATES ---
# Non-trading guardrails used before scaling live capital or strategy sleeves.
# These settings do not change order sizing or live/paper execution behavior.
validation:
  cost_model:
    slippage_bps: 10.0           # Backtest gate assumes 10 bps adverse fill per side
    fee_bps: 5.0                 # Backtest gate assumes 5 bps fees/commission per side
    min_fee_usd: 0.0

  production_gate:
    windows:
      - name: default_12m_costed
        days: 365
        end_date: "04/10/2026"
        screener: true
        strategies: [momentum, rsi_reversion, ma_crossover]
        required: true
        min_return_pct: 0.04
        max_drawdown_pct: 0.035
        min_profit_factor: 1.05
        min_trades: 40
      - name: default_6m_costed
        days: 180
        end_date: "04/10/2026"
        screener: true
        strategies: [momentum, rsi_reversion, ma_crossover]
        required: true
        min_return_pct: 0.0
        max_drawdown_pct: 0.025
        min_trades: 10
      - name: crypto_12m_costed
        days: 365
        end_date: "04/10/2026"
        screener: false
        strategies: [ma_crossover]
        required: true
        min_return_pct: 0.03
        max_drawdown_pct: 0.025
        min_profit_factor: 1.05
        min_trades: 20
      - name: crypto_recent_30d_watch
        days: 30
        screener: false
        strategies: [ma_crossover]
        required: false
        min_return_pct: 0.0
        max_drawdown_pct: 0.015
        min_trades: 4

  rsi_reversion_enablement:
    required_paper_days: 60
    min_closed_trades: 20
    min_win_rate: 0.48
    min_profit_factor: 1.15
    min_total_return_pct: 0.02
    max_drawdown_pct: 0.04
    backtest_windows:
      - name: rsi_reversion_12m_costed
        days: 365
        end_date: "04/10/2026"
        screener: true
        strategies: [rsi_reversion]
        required: true
        min_return_pct: 0.02
        max_drawdown_pct: 0.04
        min_profit_factor: 1.10
        min_trades: 15

  range_breakout_enablement:
    backtest_windows:
      - name: range_breakout_12m_costed
        days: 365
        end_date: "04/10/2026"
        screener: false
        strategies: [range_breakout]
        required: true
        min_return_pct: 0.04
        max_drawdown_pct: 0.02
        min_profit_factor: 1.50
        min_trades: 10
        min_win_rate: 0.50
      - name: range_breakout_recent_30d_watch
        days: 30
        screener: false
        strategies: [range_breakout]
        required: false
        min_return_pct: 0.0
        max_drawdown_pct: 0.015
        min_trades: 1

  gap_up_enablement:
    backtest_windows:
      - name: gap_up_12m_costed
        days: 365
        end_date: "04/10/2026"
        screener: false
        strategies: [gap_up]
        required: true
        min_return_pct: 0.01
        max_drawdown_pct: 0.015
        min_profit_factor: 2.00
        min_trades: 10
        min_win_rate: 0.65
      - name: gap_up_recent_30d_watch
        days: 30
        screener: false
        strategies: [gap_up]
        required: false
        min_return_pct: 0.0
        max_drawdown_pct: 0.015
        min_trades: 1

# --- SCHEDULING (reference only; OS scheduler templates live in scheduler/) ---
schedule:
  stock_scan_interval_min: 30        # Every 30 min during market hours
  crypto_scan_interval_min: 60       # Every 60 min, 24/7
  risk_check_interval_min: 15        # Every 15 min during market hours
  daily_report_time: "16:30"         # 4:30 PM ET
  weekly_report_day: "Monday"
  weekly_report_time: "08:00"

# --- REPORTING ---
reporting:
  trade_log_file: "data/trades.csv"
  performance_file: "data/performance.csv"
  reports_dir: "reports/"
  logs_dir: "logs/"
