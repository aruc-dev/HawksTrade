name: CI — Tests & Lint

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python3 -m unittest discover -v

      - name: Run unit tests (deprecation-warnings-as-errors)
        run: python3 -W error::DeprecationWarning -m unittest discover

      - name: Compile all modules (import sanity check)
        run: python3 -m compileall core strategies scheduler tracking tests screener

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 core strategies scheduler tracking tests screener
